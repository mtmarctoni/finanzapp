name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning with trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit for vulnerabilities
        # NOTE: Using --audit-level=critical instead of --audit-level=high because
        # the `xlsx` package (0.18.5) has 2 known high-severity vulnerabilities
        # (GHSA-4r6h-8v6p-xvw6, GHSA-5pgg-2g8v-p4x9) with no public patched version.
        # The maintainers moved to a commercial distribution model (SheetJS).
        # Switch to --audit-level=high once xlsx is replaced or a fix is available.
        run: pnpm audit --audit-level=critical

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
