name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning with trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Audit for vulnerabilities
        # Using --audit-level=critical instead of --audit-level=high because:
        # Next.js 16.0.10 has 11 high-severity vulns (no compatible patch available
        # yet in the 16.x line without breaking changes). Switch back to --audit-level=high
        # once Next.js is updated to 16.2.5+ or the xlsx package is replaced.
        run: pnpm audit --audit-level=critical

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e-tests:
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: ${{ secrets.CI_POSTGRES_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.CI_POSTGRES_URL_NON_POOLING }}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-test-secret-do-not-use-in-production
      DEV_CREDENTIALS: '[{"id":"f7a8b9c0-1e2f-3d45-6a7b-1234567890cd","email":"test@example.com","password":"password123","name":"Test User"}]'
      ALLOWED_USERS: Test User
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Initialize database schema
        run: psql "$POSTGRES_URL_NON_POOLING" -f db/init.sql

      - name: Seed test data
        run: pnpm tsx scripts/reset-test-user-data.ts

      - name: Run e2e tests
        run: pnpm test:e2e
