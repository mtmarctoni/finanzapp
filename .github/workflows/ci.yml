name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret scanning with trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit for vulnerabilities
        # Using --audit-level=critical instead of --audit-level=high because:
        # Next.js 16.0.10 has 11 high-severity vulns (no compatible patch available
        # yet in the 16.x line without breaking changes). Switch back to --audit-level=high
        # once Next.js is updated to 16.2.5+ or the xlsx package is replaced.
        run: pnpm audit --audit-level=critical

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
