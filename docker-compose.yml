services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finanzapp
      POSTGRES_PASSWORD: finanzapp_dev
      POSTGRES_DB: finanzapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://finanzapp:finanzapp_dev@db:5432/finanzapp
    depends_on:
      - db
volumes:
  pgdata:
